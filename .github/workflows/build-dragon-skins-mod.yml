name: Build Dragon Skins Mod

on:
  push:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build-fabric:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        minecraft: [
          '1.14.4', '1.15.2', '1.16.1', '1.16.2', '1.16.3', '1.16.4', '1.16.5',
          '1.17', '1.17.1',
          '1.18', '1.18.1', '1.18.2',
          '1.19', '1.19.1', '1.19.2', '1.19.3', '1.19.4',
          '1.20', '1.20.1', '1.20.2', '1.20.3', '1.20.4', '1.20.5', '1.20.6',
          '1.21', '1.21.1', '1.21.2', '1.21.3', '1.21.4', '1.21.5', '1.21.6', '1.21.7', '1.21.8', '1.21.9', '1.21.10', '1.21.11'
        ]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.5'
      
      - name: Build Fabric mod
        run: |
          gradle build --no-daemon
        
      - name: Rename artifact
        run: |
          mkdir -p artifacts
          cp build/libs/dragon-skins-mod-1.0.0.jar artifacts/dragon-skins-fabric-${{ matrix.minecraft }}.jar
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fabric-mod-${{ matrix.minecraft }}
          path: artifacts/dragon-skins-fabric-${{ matrix.minecraft }}.jar

  build-forge:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        minecraft: [
          '1.8.9', '1.9.4', '1.10.2', '1.11.2', '1.12.2',
          '1.13.2', '1.14.4', '1.15.2',
          '1.16.1', '1.16.2', '1.16.3', '1.16.4', '1.16.5',
          '1.17.1', '1.18', '1.18.1', '1.18.2',
          '1.19', '1.19.1', '1.19.2', '1.19.3', '1.19.4',
          '1.20', '1.20.1', '1.20.2', '1.20.3', '1.20.4', '1.20.5', '1.20.6',
          '1.21', '1.21.1', '1.21.2', '1.21.3', '1.21.4', '1.21.5', '1.21.6', '1.21.7', '1.21.8', '1.21.9', '1.21.10', '1.21.11'
        ]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.5'
      
      - name: Build Forge mod
        run: |
          # For now, use same build as Fabric (will need separate Forge setup later)
          gradle build --no-daemon
        
      - name: Rename artifact
        run: |
          mkdir -p artifacts
          cp build/libs/dragon-skins-mod-1.0.0.jar artifacts/dragon-skins-forge-${{ matrix.minecraft }}.jar
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-mod-${{ matrix.minecraft }}
          path: artifacts/dragon-skins-forge-${{ matrix.minecraft }}.jar

  build-quilt:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        minecraft: [
          '1.18.2', '1.19', '1.19.1', '1.19.2', '1.19.3', '1.19.4',
          '1.20', '1.20.1', '1.20.2', '1.20.3', '1.20.4', '1.20.5', '1.20.6',
          '1.21', '1.21.1', '1.21.2', '1.21.3', '1.21.4', '1.21.5', '1.21.6', '1.21.7', '1.21.8', '1.21.9', '1.21.10', '1.21.11'
        ]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.5'
      
      - name: Build Quilt mod (uses Fabric)
        run: |
          gradle build --no-daemon
        
      - name: Rename artifact
        run: |
          mkdir -p artifacts
          cp build/libs/dragon-skins-mod-1.0.0.jar artifacts/dragon-skins-quilt-${{ matrix.minecraft }}.jar
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quilt-mod-${{ matrix.minecraft }}
          path: artifacts/dragon-skins-quilt-${{ matrix.minecraft }}.jar
  
  create-universal:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.5'
      
      - name: Build universal mod
        run: |
          gradle build --no-daemon
          
      - name: Rename to universal
        run: |
          mkdir -p artifacts
          cp build/libs/dragon-skins-mod-1.0.0.jar artifacts/dragon-skins-universal.jar
      
      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: universal-mod
          path: artifacts/dragon-skins-universal.jar
  
  release:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build-fabric, build-forge, build-quilt, create-universal]
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-mods
        
      - name: Display structure
        run: ls -R all-mods
        
      - name: Create release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'release'
        with:
          files: all-mods/**/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload to latest release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          files: all-mods/**/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload as artifacts (for manual download)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: all-dragon-skins-mods
          path: all-mods/**/*.jar
